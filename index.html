<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Minsoo Portfolio</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #f7f8fb;
      color: #1f2937;
    }
    main {
      width: min(720px, calc(100% - 40px));
      padding: 40px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: white;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 36px;
    }
    p {
      margin: 0;
      font-size: 18px;
      line-height: 1.6;
      color: #4b5563;
    }
  </style>
</head>
<body>
  <main>
    <h1>Minsoo Portfolio</h1>
    <p>GitHub Pages site is live.</p>
  </main>
</body>
</html>
